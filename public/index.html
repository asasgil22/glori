<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- PORTAL_SEO -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css?v=5" />

    <style>
      /* Efeito de carregamento Rosa VBET no Carrossel da Index */
      .hero-carousel__dot.is-active {
        background-color: rgba(
          247,
          0,
          104,
          0.2
        ) !important; /* Fundo translúcido para a barra aparecer */
      }
      .hero-carousel__dot.is-active::before,
      .hero-carousel__dot.is-active::after,
      .hero-carousel__dot.is-animating::before,
      .hero-carousel__dot.is-animating::after {
        background-color: #f70068 !important; /* Cor Rosa vibrante da VBET */
      }
      .hero-carousel__dot {
        border-color: rgba(247, 0, 104, 0.4) !important;
      }

      /* Transições Suaves para o Modo Noturno */
      body {
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }
      .glass-panel {
        transition:
          background-color 0.3s ease,
          border-color 0.3s ease;
      }

      /* ==========================================
         FORÇAR REGRAS DO MODO NOTURNO (DARK MODE)
         ========================================== */
      [data-bs-theme="dark"] body {
        color: #e4e4e4 !important;
      }
      [data-bs-theme="dark"] .glass-nav {
        background-color: rgba(18, 18, 18, 0.95) !important;
        border-bottom-color: rgba(255, 255, 255, 0.05) !important;
      }
      [data-bs-theme="dark"] .glass-panel,
      [data-bs-theme="dark"] .card,
      [data-bs-theme="dark"] .widget-card,
      [data-bs-theme="dark"] .bg-white,
      [data-bs-theme="dark"] .bg-light,
      [data-bs-theme="dark"] #live-search-results,
      [data-bs-theme="dark"] .home-toolbar {
        background-color: #1e1e1e !important;
        border-color: rgba(255, 255, 255, 0.1) !important;
        color: #e4e4e4 !important;
      }
      [data-bs-theme="dark"] .text-dark {
        color: #f8f9fa !important;
      }
      [data-bs-theme="dark"] .text-muted {
        color: #adb5bd !important;
      }
      [data-bs-theme="dark"] .modal-content {
        background-color: #1e1e1e !important;
        border-color: rgba(255, 255, 255, 0.1) !important;
      }
      [data-bs-theme="dark"] [style*="background-color: var(--site-bg-color"] {
        background-color: #1e1e1e !important;
      }
      [data-bs-theme="dark"] [style*="color-mix"] {
        background-color: color-mix(
          in srgb,
          var(--accent, #0f766e) 20%,
          #1e1e1e
        ) !important;
      }
      [data-bs-theme="dark"] .table {
        color: #e4e4e4 !important;
      }
      [data-bs-theme="dark"] .table th,
      [data-bs-theme="dark"] .table td {
        border-bottom-color: rgba(255, 255, 255, 0.05) !important;
      }

      [data-bs-theme="dark"] .news-item h2 {
        color: #000000 !important;
      }

      /* Efeitos Avançados da Barra de Busca (Mac/Spotlight Style) */
      #busca:focus {
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1) !important;
        background: #ffffff !important;
        transform: translateY(-2px);
      }
      [data-bs-theme="dark"] #busca {
        background: rgba(30, 30, 30, 0.7) !important;
        color: #ffffff !important;
      }
      [data-bs-theme="dark"] #busca:focus {
        background: #1e1e1e !important;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3) !important;
      }
      [data-bs-theme="dark"] .search-shortcut kbd {
        background-color: #333 !important;
        border-color: #444 !important;
        color: #bbb !important;
      }
    </style>
  </head>
  <body class="site-body">
    <nav class="navbar navbar-expand-lg glass-nav sticky-top">
      <div class="container">
        <a class="navbar-brand brand-lockup" href="/" id="brand-link"
          >Portal Noticias</a
        >
        <div class="ms-auto d-flex align-items-center gap-3">
          <button
            id="btn-dark-mode"
            class="btn btn-link text-light p-0 border-0"
            aria-label="Alternar tema"
          >
            <svg
              id="icon-sun"
              class="d-none"
              viewBox="0 0 24 24"
              width="20"
              height="20"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg
              id="icon-moon"
              viewBox="0 0 24 24"
              width="20"
              height="20"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <section id="carousel-section" class="mb-4"></section>

      <div
        class="position-relative mb-4"
        id="menu-wrapper"
        style="display: none"
      >
        <div class="d-flex align-items-center mb-3 px-2">
          <h6
            class="m-0 fw-bold text-uppercase"
            style="letter-spacing: 0.5px; font-size: 0.85rem"
          >
            <span style="color: var(--accent, #111)">|</span> Nossos Colunistas
          </h6>
          <hr class="flex-grow-1 ms-3 my-0 text-muted opacity-25" />
        </div>

        <button
          id="menu-scroll-left"
          class="btn btn-light bg-white rounded-circle position-absolute top-50 translate-middle-y shadow d-flex align-items-center justify-content-center border-0"
          style="
            left: -15px;
            z-index: 10;
            width: 40px;
            height: 40px;
            margin-top: -15px;
            display: none !important;
          "
        >
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>

        <div
          id="menu"
          class="d-flex gap-2 gap-md-3 py-3 custom-scrollbar px-2"
          style="
            overflow-x: auto;
            flex-wrap: nowrap;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
          "
        ></div>

        <button
          id="menu-scroll-right"
          class="btn btn-light bg-white rounded-circle position-absolute top-50 translate-middle-y shadow d-flex align-items-center justify-content-center border-0"
          style="
            right: -15px;
            z-index: 10;
            width: 40px;
            height: 40px;
            margin-top: -15px;
            display: none !important;
          "
        >
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>

      <section class="home-toolbar mb-4" id="home-toolbar">
        <div id="busca-header-display">
          <strong id="busca-titulo-display">Explore o portal</strong>
          <span id="busca-subtitulo-display"
            >busque por titulo, assunto ou categoria</span
          >
        </div>
        <form id="form-filtros" class="toolbar-form position-relative mt-3">
          <div class="position-relative">
            <svg
              class="position-absolute top-50 translate-middle-y text-muted"
              style="left: 20px; z-index: 10; width: 22px; height: 22px"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              viewBox="0 0 24 24"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>

            <input
              type="search"
              id="busca"
              class="form-control border-0 shadow-sm"
              placeholder="Pesquisar notícias, categorias ou autores..."
              autocomplete="off"
              style="
                border-radius: 50px;
                padding: 18px 20px 18px 55px;
                font-size: 1.1rem;
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(10px);
                transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
              "
            />

            <div
              class="search-shortcut position-absolute top-50 translate-middle-y d-none d-md-flex align-items-center"
              style="right: 15px; z-index: 10; pointer-events: none"
            >
              <kbd
                class="bg-light text-muted border shadow-sm px-2 py-1 rounded-3"
                style="font-family: monospace; font-size: 0.75rem"
                >Ctrl K</kbd
              >
            </div>
          </div>
          <div
            id="live-search-results"
            class="position-absolute w-100 bg-white shadow-lg rounded-4 d-none border"
            style="
              top: calc(100% + 12px);
              left: 0;
              z-index: 1050;
              max-height: 350px;
              overflow-y: auto;
              margin-top: 8px;
            "
          ></div>
        </form>
      </section>

      <div class="row g-4" id="layout-home">
        <section class="col-lg-8" id="col-noticias">
          <div
            id="header-ultimas"
            class="section-heading mb-4 d-flex justify-content-start align-items-center"
          >
            <div
              class="d-flex align-items-center gap-2 bg-light rounded-pill px-3 py-2 border shadow-sm"
            >
              <div
                class="spinner-grow"
                style="
                  width: 10px;
                  height: 10px;
                  background-color: #f70068 !important;
                "
                role="status"
              >
                <span class="visually-hidden">Live</span>
              </div>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                fill="currentColor"
                class="text-muted"
                viewBox="0 0 16 16"
              >
                <path
                  d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71z"
                />
                <path
                  d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0"
                />
              </svg>
              <span
                id="texto-atualizacao"
                class="text-muted mb-0"
                style="
                  font-size: 0.75rem;
                  font-weight: 600;
                  text-transform: uppercase;
                  letter-spacing: 0.5px;
                "
                >Atualizando em 60s</span
              >
              <div
                class="progress ms-2"
                style="
                  height: 4px;
                  width: 60px;
                  background-color: rgba(0, 0, 0, 0.08);
                  border-radius: 2px;
                  overflow: hidden;
                "
              >
                <div
                  id="barra-progresso"
                  class="progress-bar"
                  style="
                    background-color: #f70068 !important;
                    width: 0%;
                    transition: width 1s linear;
                  "
                  role="progressbar"
                ></div>
              </div>
            </div>
          </div>

          <div id="grid-noticias" class="news-list"></div>
          <div id="sentinela-scroll" style="height: 10px; width: 100%"></div>
        </section>

        <aside class="col-lg-4" id="sidebar-home">
          <div class="sticky-sidebar widgets-stack">
            <section class="widget-card" data-widget="mais-lidas">
              <header class="widget-card__head"></header>
              <div class="widget-card__body" id="mais-lidas"></div>
            </section>

            <section class="widget-card" data-widget="jogos">
              <header class="widget-card__head"></header>
              <div class="widget-card__body" id="widget-jogos"></div>
            </section>

            <section class="widget-card" data-widget="enquete">
              <header class="widget-card__head"></header>
              <div class="widget-card__body" id="widget-enquete"></div>
            </section>

            <section class="widget-card" data-widget="tabela">
              <header class="widget-card__head"></header>
              <div class="widget-card__body p-0" id="widget-tabela"></div>
            </section>

            <section class="widget-card" data-widget="odds">
              <header class="widget-card__head"></header>
              <div class="widget-card__body p-3" id="widget-odds"></div>
            </section>
          </div>
        </aside>
      </div>
    </main>

    <footer class="site-footer">
      Esse projeto foi criado e desenvolvido por Sergio Gil utilizando a
      tecnologia Node.js | 2026
    </footer>

    <button
      id="btn-back-to-top"
      class="btn btn-accent rounded-circle shadow position-fixed d-none align-items-center justify-content-center"
      style="
        bottom: 20px;
        right: 20px;
        width: 50px;
        height: 50px;
        z-index: 1040;
        transition: opacity 0.3s;
      "
      onclick="window.scrollTo({ top: 0, behavior: 'smooth' })"
      aria-label="Voltar ao topo"
    >
      <svg
        viewBox="0 0 24 24"
        width="24"
        height="24"
        stroke="currentColor"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>

    <!-- Modal RSS -->
    <div
      class="modal fade"
      id="modalNoticiaRSS"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div
          class="modal-content border-0 shadow-lg"
          style="border-radius: 1.2rem"
        >
          <div id="modal-rss-area-imagem" class="position-relative"></div>
          <button
            type="button"
            class="btn-close btn-close-white position-absolute top-0 end-0 m-4 shadow-sm"
            data-bs-dismiss="modal"
            aria-label="Close"
            style="
              z-index: 10;
              background-color: rgba(0, 0, 0, 0.5);
              border-radius: 50%;
              padding: 0.8rem;
            "
          ></button>
          <div class="modal-body p-4 p-md-5">
            <div class="d-flex align-items-center mb-4">
              <img
                id="modal-rss-logo-fonte"
                src=""
                alt="Fonte"
                style="height: 24px"
                class="me-3 shadow-sm rounded"
              />
              <span
                id="modal-rss-data"
                class="badge rounded-pill date-badge px-3 py-2 text-uppercase fw-bold border text-dark"
                style="background-color: #f1f2f6"
              ></span>
            </div>
            <h2
              id="modal-rss-titulo"
              class="fw-bold mb-4"
              style="
                font-family: &quot;Georgia&quot;, serif;
                color: #1e272e;
                font-size: 1.8rem;
                line-height: 1.3;
              "
            ></h2>
            <p
              id="modal-rss-resumo"
              class="text-secondary fs-5"
              style="line-height: 1.7"
            ></p>
          </div>
          <div
            class="modal-footer p-4 p-md-5 pt-0 border-0 justify-content-start"
          >
            <a
              id="modal-rss-link-oficial"
              href="#"
              target="_blank"
              class="btn btn-dark btn-lg px-4 py-3 rounded-pill fw-bold w-100 w-md-auto"
              style="
                letter-spacing: 0.5px;
                transition:
                  transform 0.2s,
                  box-shadow 0.2s;
              "
            >
              Continuar lendo na íntegra ➔
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/portal-theme.js"></script>
    <script src="js/portal-brand.js"></script>
    <script src="js/carrossel.js"></script>
    <script src="js/widgets-config.js"></script>
    <script src="js/seo.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
