<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Administrativo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card">
        <div class="text-center mb-4">
          <div
            id="login-brand"
            class="d-flex justify-content-center mb-3"
          ></div>
          <p style="color: rgba(255, 255, 255, 0.65)">Acesso administrativo</p>
        </div>

        <div id="erro-mensagem" class="alert alert-danger d-none small"></div>

        <form id="form-login">
          <div class="mb-3">
            <label for="usuario" class="form-label">Usuario</label>
            <input
              type="text"
              id="usuario"
              class="form-control"
              required
              autocomplete="username"
              placeholder="admin"
            />
          </div>
          <div class="mb-4">
            <label for="senha" class="form-label">Senha</label>
            <input
              type="password"
              id="senha"
              class="form-control"
              required
              autocomplete="current-password"
              placeholder="12345"
            />
          </div>
          <button type="submit" class="btn btn-accent w-100">Entrar</button>
        </form>

        <a href="index.html" class="back-link">Voltar para o site</a>
      </section>
    </main>

    <script src="js/portal-theme.js"></script>
    <script src="js/portal-brand.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        try {
          const res = await fetch("/api/config");
          const config = await res.json();
          if (typeof aplicarTemaPortal === "function")
            aplicarTemaPortal(config);
          if (typeof renderizarMarca === "function")
            renderizarMarca(config, document.getElementById("login-brand"));
        } catch (e) {}

        // Observa se o script de login exibiu a mensagem de erro para disparar o "Tremor" (Shake)
        const erroMsg = document.getElementById("erro-mensagem");
        if (erroMsg) {
          new MutationObserver((mutations) => {
            mutations.forEach((m) => {
              if (!erroMsg.classList.contains("d-none")) {
                const card = document.querySelector(".login-card");
                card.classList.remove("shake-error");
                void card.offsetWidth; // Força o reflow da animação
                card.classList.add("shake-error");
              }
            });
          }).observe(erroMsg, { attributes: true, attributeFilter: ["class"] });
        }
      });
    </script>
    <script src="js/login.js"></script>
  </body>
</html>
